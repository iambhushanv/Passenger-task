<div class="container">
    <div class="row">
        <div class="col-12">
            <app-passenger-count
           [CheckInCount]="checkInArray.length"
            [totalCount]="passArr.length"
            >
            </app-passenger-count>
            <div class="card mb-4" *ngIf="passArr.length > 0 ; else noPassenger">
                <div class="card-body">
                    <ul class="list-group">
                        <li 
                        *ngFor="let pass of passArr ; trackBy : trackByFun"
                        class="list-group-item">
                        {{pass.fullname}}
                        </li>
                    </ul>
                </div> 
            </div>
            <ng-template #noPassenger>
                <p class="alert alert-info">
                    No Passengers !!!
                </p>
            </ng-template>
            <app-passenger-card
            (emitCheckedInflag)="getRemoveFlag($event)"
            [passObj]="pass"
            *ngFor="let pass of passArr ; trackBy : trackByFun"></app-passenger-card>
        </div>
    </div>
</div>
